<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Council Bridge</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f5;
        --panel: #ffffff;
        --text: #202832;
        --muted: #667383;
        --border: #d9e0e7;
        --chatgpt: #0f8f68;
        --chatgpt-bg: #dffaf0;
        --chatgpt-border: #5ad0a9;
        --gemini: #2563eb;
        --gemini-bg: #e2edff;
        --gemini-border: #7aa7ff;
        --christopher: #7c3aed;
        --christopher-bg: #f0e7ff;
        --christopher-border: #b899ff;
        --primary: #255f85;
        --primary-hover: #1e4f70;
        --secondary: #edf3f6;
        --secondary-hover: #dfeaf0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 300px;
        height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
      }

      main {
        display: grid;
        grid-template-rows: auto minmax(160px, 1fr) auto;
        gap: 12px;
        height: 100vh;
        padding: 14px;
      }

      header {
        display: grid;
        gap: 8px;
      }

      .topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0;
      }

      button {
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 9px 10px;
        color: var(--text);
        background: var(--secondary);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--secondary-hover);
      }

      button.primary {
        width: 100%;
        border-color: var(--primary);
        color: #ffffff;
        background: var(--primary);
      }

      button.primary:hover {
        background: var(--primary-hover);
      }

      .quick-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .session-panel {
        display: grid;
        gap: 8px;
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 9px;
        background: var(--panel);
      }

      .session-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .session-actions button {
        padding: 7px 8px;
        font-size: 12px;
      }

      .nickname-row {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .nickname-row input {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 7px;
        color: var(--text);
        background: var(--bg);
        font: inherit;
      }

      .session-summary {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
        white-space: pre-line;
      }

      .handoff-panel {
        display: none;
        gap: 8px;
        border: 1px solid var(--border);
        border-left: 4px solid var(--christopher);
        border-radius: 7px;
        padding: 9px;
        background: var(--panel);
      }

      .handoff-panel.visible {
        display: grid;
      }

      .handoff-notice {
        margin: 0;
        color: var(--text);
        font-size: 12px;
        line-height: 1.4;
      }

      .handoff-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .handoff-actions button {
        padding: 7px 8px;
        font-size: 12px;
      }

      button.link {
        border: 0;
        padding: 4px 0;
        color: var(--muted);
        background: transparent;
        font-size: 12px;
      }

      button.link:hover {
        color: var(--text);
        background: transparent;
      }

      .status {
        min-height: 17px;
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .turns {
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 0;
        overflow-y: auto;
        padding-right: 2px;
      }

      .empty {
        margin: auto;
        max-width: 260px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
        text-align: center;
      }

      .turn {
        display: grid;
        gap: 6px;
        border: 1px solid var(--border);
        border-left-width: 4px;
        border-radius: 7px;
        padding: 10px;
        background: var(--panel);
      }

      .turn.chatgpt {
        border-color: var(--chatgpt-border);
        border-left-color: var(--chatgpt);
        background: var(--chatgpt-bg);
      }

      .turn.gemini {
        border-color: var(--gemini-border);
        border-left-color: var(--gemini);
        background: var(--gemini-bg);
      }

      .turn.christopher {
        border-color: var(--christopher-border);
        border-left-color: var(--christopher);
        background: var(--christopher-bg);
      }

      .turn.typing {
        border-style: dashed;
      }

      .typing-state {
        color: var(--muted);
        font-size: 12px;
        font-style: italic;
      }

      .typing-text {
        color: var(--muted);
        font-weight: 700;
      }

      .typing-dots {
        display: inline-block;
        width: 18px;
        overflow: hidden;
        vertical-align: bottom;
        animation: typing-dots 900ms steps(4, end) infinite;
      }

      @keyframes typing-dots {
        0% {
          width: 0;
        }

        100% {
          width: 18px;
        }
      }

      .turn-meta {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .speaker {
        color: var(--text);
        font-weight: 700;
      }

      .turn-details {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 4px 8px;
        text-align: right;
      }

      .timestamp {
        font-variant-numeric: tabular-nums;
      }

      .turn-text {
        margin: 0;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        line-height: 1.4;
      }

      .composer {
        display: grid;
        gap: 8px;
      }

      textarea {
        width: 100%;
        min-height: 112px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px;
        color: var(--text);
        background: var(--panel);
        font: 13px/1.4 Arial, Helvetica, sans-serif;
      }

      .send-row {
        display: grid;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="topline">
          <h1>Council Bridge</h1>
          <button id="clearConversation" class="link" type="button">Clear</button>
        </div>
        <button id="passSelection" class="primary" type="button">Pass selected reply to other AI</button>
        <div class="quick-actions">
          <button id="addSelection" type="button">Add selection</button>
          <button id="refreshReplies" type="button">Refresh replies</button>
        </div>
        <section class="session-panel" aria-label="Council session">
          <p id="sessionSummary" class="session-summary"></p>
          <label class="nickname-row">
            <span>ChatGPT name</span>
            <input id="chatgptNickname" type="text" placeholder="ChatGPT">
          </label>
          <label class="nickname-row">
            <span>Gemini name</span>
            <input id="geminiNickname" type="text" placeholder="Gemini">
          </label>
          <div class="session-actions">
            <button id="setActiveAsChatGPT" type="button">Set as ChatGPT</button>
            <button id="setActiveAsGemini" type="button">Set as Gemini</button>
            <button id="removeActiveFromCouncil" type="button">Remove tab</button>
            <button id="toggleCapturePause" type="button">Pause capture</button>
          </div>
        </section>
        <section id="handoffPanel" class="handoff-panel" aria-label="Pending handoff">
          <p id="handoffNotice" class="handoff-notice"></p>
          <div class="handoff-actions">
            <button id="approveHandoff" type="button">Approve handoff</button>
            <button id="rejectHandoff" type="button">Reject handoff</button>
            <button id="approveOneHandoff" type="button">Approve next 1 turn</button>
            <button id="approveThreeHandoffs" type="button">Approve next 3 turns</button>
          </div>
        </section>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </header>

      <section id="turns" class="turns" aria-label="Conversation"></section>

      <section class="composer" aria-label="Composer">
        <textarea id="composerText" placeholder="Write as Christopher..."></textarea>
        <div class="send-row">
          <button id="sendComposer" class="primary" type="button">Send</button>
        </div>
      </section>
    </main>
    <script src="sidepanel.js"></script>
  </body>
</html>
