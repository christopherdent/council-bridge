<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Council Bridge</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f5;
        --panel: #ffffff;
        --text: #202832;
        --muted: #667383;
        --border: #d9e0e7;
        --chatgpt: #0f8f68;
        --chatgpt-bg: #dffaf0;
        --chatgpt-border: #5ad0a9;
        --gemini: #2563eb;
        --gemini-bg: #e2edff;
        --gemini-border: #7aa7ff;
        --christopher: #7c3aed;
        --christopher-bg: #f0e7ff;
        --christopher-border: #b899ff;
        --primary: #255f85;
        --primary-hover: #1e4f70;
        --secondary: #edf3f6;
        --secondary-hover: #dfeaf0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 300px;
        height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 14px;
      }

      main {
        display: grid;
        grid-template-rows: auto minmax(220px, 1fr) auto;
        gap: 8px;
        height: 100vh;
        padding: 10px;
      }

      header {
        display: grid;
        gap: 6px;
      }

      .topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      h1 {
        margin: 0;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0;
      }

      button {
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 9px;
        color: var(--text);
        background: var(--secondary);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: var(--secondary-hover);
      }

      button:disabled {
        border-color: var(--border);
        color: var(--muted);
        background: #eef1f3;
        cursor: not-allowed;
        opacity: 0.62;
      }

      button:disabled:hover {
        background: #eef1f3;
      }

      button.primary {
        width: 100%;
        border-color: var(--primary);
        color: #ffffff;
        background: var(--primary);
      }

      button.primary:hover {
        background: var(--primary-hover);
      }

      button.icon-button {
        display: inline-grid;
        width: 30px;
        height: 30px;
        place-items: center;
        padding: 0;
        font-size: 16px;
        line-height: 1;
      }

      .session-panel {
        display: grid;
        gap: 7px;
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 7px 8px;
        background: var(--panel);
      }

      .session-panel summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        list-style: none;
      }

      .session-panel summary::-webkit-details-marker {
        display: none;
      }

      .session-panel summary::after {
        content: "Show";
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }

      .session-panel[open] summary::after {
        content: "Hide";
      }

      .session-panel-body {
        display: grid;
        gap: 7px;
        padding-top: 6px;
      }

      .session-actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 5px;
      }

      .session-actions button {
        min-width: 0;
        padding: 6px 5px;
        overflow: hidden;
        font-size: 11px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .nickname-row {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .nickname-row input {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 7px;
        color: var(--text);
        background: var(--bg);
        font: inherit;
      }

      .mode-row {
        display: flex;
        align-items: center;
        gap: 7px;
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
      }

      .mode-row input {
        width: 15px;
        height: 15px;
        margin: 0;
      }

      .mode-row select,
      .mode-row input[type="number"] {
        min-width: 0;
        margin-left: auto;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 6px;
        color: var(--text);
        background: var(--bg);
        font: inherit;
      }

      .mode-row input[type="number"] {
        width: 54px;
        height: auto;
      }

      .mode-row.submode {
        padding-left: 22px;
        color: var(--muted);
        font-weight: 400;
      }

      .mode-row.submode:has(input:disabled) {
        opacity: 0.55;
      }

      .session-summary {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
        white-space: pre-line;
      }

      .handoff-panel {
        display: none;
        gap: 8px;
        border: 1px solid var(--border);
        border-left: 4px solid var(--christopher);
        border-radius: 7px;
        padding: 9px;
        background: var(--panel);
      }

      .handoff-panel.visible {
        display: grid;
      }

      .handoff-panel.visible.ready {
        border-color: #f59e0b;
        border-left-color: #ef4444;
        background: #fff7ed;
        animation: handoff-panel-pulse 700ms ease-in-out infinite;
      }

      .handoff-notice {
        margin: 0;
        color: var(--text);
        font-size: 12px;
        line-height: 1.4;
      }

      .handoff-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .handoff-actions button {
        padding: 7px 8px;
        font-size: 12px;
      }

      .handoff-panel.visible.ready #approveHandoff:not(:disabled) {
        border-color: #dc2626;
        color: #ffffff;
        background: #dc2626;
        animation: approve-handoff-flash 520ms ease-in-out infinite;
      }

      @keyframes handoff-panel-pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.35);
        }

        50% {
          box-shadow: 0 0 0 5px rgba(239, 68, 68, 0.28);
        }
      }

      @keyframes approve-handoff-flash {
        0%,
        100% {
          filter: brightness(1);
          transform: scale(1);
        }

        50% {
          filter: brightness(1.45);
          transform: scale(1.04);
        }
      }

      button.link {
        border: 0;
        padding: 4px 0;
        color: var(--muted);
        background: transparent;
        font-size: 12px;
      }

      button.link:hover {
        color: var(--text);
        background: transparent;
      }

      .status {
        min-height: 15px;
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .turns {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 0;
        overflow-y: auto;
        padding-right: 2px;
      }

      .empty {
        margin: auto;
        max-width: 260px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
        text-align: center;
      }

      .turn {
        display: grid;
        gap: 6px;
        border: 1px solid var(--border);
        border-left-width: 4px;
        border-radius: 7px;
        padding: 9px;
        background: var(--panel);
      }

      .turn.chatgpt {
        border-color: var(--chatgpt-border);
        border-left-color: var(--chatgpt);
        background: var(--chatgpt-bg);
      }

      .turn.gemini {
        border-color: var(--gemini-border);
        border-left-color: var(--gemini);
        background: var(--gemini-bg);
      }

      .turn.christopher,
      .turn.user {
        border-color: var(--christopher-border);
        border-left-color: var(--christopher);
        background: var(--christopher-bg);
      }

      .turn.typing {
        border-style: dashed;
        min-height: 74px;
      }

      .typing-state {
        color: var(--muted);
        font-size: 12px;
        font-style: italic;
      }

      .typing-text {
        display: inline-flex;
        align-items: baseline;
        min-width: 92px;
        color: var(--muted);
        font-weight: 700;
      }

      .typing-dot {
        display: inline-block;
        width: 5px;
        opacity: 0.25;
        vertical-align: bottom;
        animation: typing-dot 900ms ease-in-out infinite;
      }

      .typing-dot:nth-child(1) {
        animation-delay: 0ms;
      }

      .typing-dot:nth-child(2) {
        animation-delay: 140ms;
      }

      .typing-dot:nth-child(3) {
        animation-delay: 280ms;
      }

      @keyframes typing-dot {
        0%,
        70%,
        100% {
          opacity: 0.25;
        }

        35% {
          opacity: 1;
        }
      }

      .turn-meta {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .speaker {
        color: var(--text);
        font-weight: 700;
      }

      .turn-details {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 4px 8px;
        text-align: right;
      }

      .timestamp {
        font-variant-numeric: tabular-nums;
      }

      .turn-text {
        margin: 0;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        line-height: 1.4;
      }

      .turn-context {
        margin: 0;
        overflow: hidden;
        color: var(--muted);
        font-size: 11px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .composer {
        display: grid;
        gap: 6px;
      }

      .composer-tools {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }

      .page-attachment {
        display: flex;
        align-items: center;
        min-width: 0;
        max-width: 100%;
        gap: 5px;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 6px;
        color: var(--muted);
        background: var(--panel);
        font-size: 11px;
      }

      .page-attachment[hidden] {
        display: none;
      }

      .page-attachment-title {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .page-attachment button {
        flex: 0 0 auto;
        width: 22px;
        height: 22px;
        padding: 0;
        line-height: 1;
      }

      textarea {
        width: 100%;
        min-height: 68px;
        max-height: 150px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px;
        color: var(--text);
        background: var(--panel);
        font: 13px/1.4 Arial, Helvetica, sans-serif;
      }

      .send-row {
        display: grid;
        gap: 8px;
      }

      .send-row button {
        padding: 8px 10px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="topline">
          <h1>Council Bridge</h1>
          <div class="header-actions">
            <button id="refreshReplies" class="icon-button" type="button" title="Refresh latest replies" aria-label="Refresh latest replies">&#8635;</button>
            <button id="clearConversation" class="link" type="button">Clear</button>
          </div>
        </div>
        <details class="session-panel" aria-label="Council session">
          <summary>Council setup</summary>
          <div class="session-panel-body">
            <p id="sessionSummary" class="session-summary"></p>
            <label class="nickname-row">
              <span>Your name</span>
              <input id="humanNickname" type="text" placeholder="User">
            </label>
            <label class="nickname-row">
              <span>ChatGPT name</span>
              <input id="chatgptNickname" type="text" placeholder="ChatGPT">
            </label>
            <label class="nickname-row">
              <span>Gemini name</span>
              <input id="geminiNickname" type="text" placeholder="Gemini">
            </label>
            <label class="mode-row">
              <input id="roundtableMode" type="checkbox">
              <span>Roundtable mode</span>
            </label>
            <label class="mode-row submode">
              <input id="roundtableAutonomous" type="checkbox">
              <span>Have at it</span>
              <input id="roundtableTurnLimit" type="number" min="2" max="10" step="1" value="6" aria-label="Autonomous roundtable turn limit">
            </label>
            <label class="mode-row">
              <input id="autoRecovery" type="checkbox">
              <span>Recover stalled replies</span>
              <select id="recoveryTimeout" aria-label="Stalled reply timeout">
                <option value="5">5 min</option>
                <option value="7">7 min</option>
                <option value="10">10 min</option>
              </select>
            </label>
            <div class="session-actions">
              <button id="setActiveAsChatGPT" type="button" title="Assign the active tab as ChatGPT">Set GPT</button>
              <button id="setActiveAsGemini" type="button" title="Assign the active tab as Gemini">Set Gem</button>
              <button id="removeActiveFromCouncil" type="button" title="Remove the active tab from this council">Remove</button>
              <button id="freshChatGPT" type="button" title="Open a fresh ChatGPT council tab and seed it with recent context">New GPT</button>
              <button id="freshGemini" type="button" title="Open a fresh Gemini council tab and seed it with recent context">New Gem</button>
              <button id="toggleCapturePause" type="button" title="Pause or resume automatic reply capture">Pause</button>
            </div>
          </div>
        </details>
        <section id="handoffPanel" class="handoff-panel" aria-label="Pending handoff">
          <p id="handoffNotice" class="handoff-notice"></p>
          <div class="handoff-actions">
            <button id="approveHandoff" type="button">Approve handoff</button>
            <button id="rejectHandoff" type="button">Reject handoff</button>
            <button id="approveOneHandoff" type="button">Approve next 1 turn</button>
            <button id="approveThreeHandoffs" type="button">Approve next 3 turns</button>
            <button id="approveTenHandoffs" type="button">Approve next 10 turns</button>
          </div>
        </section>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </header>

      <section id="turns" class="turns" aria-label="Conversation"></section>

      <section class="composer" aria-label="Composer">
        <div class="composer-tools">
          <button id="attachPageContext" class="icon-button" type="button" title="Attach context from the active non-chat page" aria-label="Attach current page context">&#128206;</button>
          <div id="pageContextAttachment" class="page-attachment" hidden>
            <span id="pageContextTitle" class="page-attachment-title"></span>
            <button id="removePageContext" type="button" title="Remove page context" aria-label="Remove page context">&times;</button>
          </div>
        </div>
        <textarea id="composerText" placeholder="Write as User..."></textarea>
        <div class="send-row">
          <button id="sendComposer" class="primary" type="button">Send</button>
        </div>
      </section>
    </main>
    <script src="routing.js"></script>
    <script src="orchestration.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
